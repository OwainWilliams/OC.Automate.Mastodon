name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/OC.Automate.Mastodon/OC.Automate.Mastodon.csproj -c Release

      - name: Test
        run: dotnet test tests/OC.Automate.Mastodon.Tests/OC.Automate.Mastodon.Tests.csproj -c Release
