name: Release to NuGet

# Publishes to NuGet only when a stable release tag (e.g. 2.0.0) is pushed.
# Pre-release versions (e.g. 2.0.0-alpha1) are for internal use and are never
# published by CI.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: NuGet login
        uses: Nuget/login@v1
        id: login
        with:
          user: scottishcoder

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test tests/OC.Automate.Mastodon.Tests/OC.Automate.Mastodon.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack src/OC.Automate.Mastodon/OC.Automate.Mastodon.csproj -c Release /p:Version=${{ github.ref_name }} --output artifacts

      - name: NuGet push
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
